name: Eneba Price Monitor

on:
  schedule:
    - cron: '0 0,* * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run monitor
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: npx ts-node src/index.ts

      - name: Commit results
        run: |
          git config user.name "eneba-monitor-bot"
          git config user.email "bot@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "chore: update price log $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
